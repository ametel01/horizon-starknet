name: Cairo Tests

on:
  push:
    branches: [main]
    paths: [contracts/**]
  pull_request:
    branches: [main]
    paths: [contracts/**]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.0"

      - name: Setup snfoundry
        uses: foundry-rs/setup-snfoundry@v4
        with:
          starknet-foundry-version: "0.54.0"

      - name: Run tests
        run: snforge test
