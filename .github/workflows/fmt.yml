name: Format

on:
  push:
    branches: [main]
    paths: [contracts/**]
  pull_request:
    branches: [main]
    paths: [contracts/**]

jobs:
  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.14.0"

      - name: Check formatting
        run: scarb fmt --check
