name: Cairo Lint

on:
  push:
    branches: [main]
    paths: [contracts/**]
  pull_request:
    branches: [main]
    paths: [contracts/**]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      SCARB_UI_VERBOSITY: no-warnings
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.19.1"

      - name: Lint check
        run: scarb check
