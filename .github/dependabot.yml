version: 2
updates:
  # Frontend package (Next.js/Bun)
  - package-ecosystem: "npm"
    directory: "/packages/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
    groups:
      # Group minor/patch updates together to reduce PR noise
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  # Indexer package
  - package-ecosystem: "npm"
    directory: "/packages/indexer"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "indexer"
    commit-message:
      prefix: "deps(indexer)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
    open-pull-requests-limit: 5
