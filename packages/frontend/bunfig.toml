# Bun configuration
# See: https://bun.sh/docs/runtime/bunfig

[install.security]
# OSV vulnerability scanner - blocks high/critical vulnerabilities during install
# See: https://github.com/bun-security-scanner/osv
scanner = "@bun-security-scanner/osv"

[test]
# Exclude Playwright E2E tests from Bun test runner
# These are run separately with `bun run test:e2e`
root = "./src"
