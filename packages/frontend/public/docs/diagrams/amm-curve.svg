<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <!-- Background -->
  <rect width="600" height="320" fill="#18181b"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#fafafa" font-size="14" font-weight="600" font-family="system-ui, sans-serif">AMM Pricing Curve</text>

  <!-- Axes -->
  <line x1="80" y1="260" x2="550" y2="260" stroke="#71717a" stroke-width="2"/>
  <line x1="80" y1="50" x2="80" y2="260" stroke="#71717a" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="65" y="265" text-anchor="end" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">0.90</text>
  <text x="65" y="190" text-anchor="end" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">0.95</text>
  <text x="65" y="120" text-anchor="end" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">1.00</text>
  <text x="65" y="55" text-anchor="end" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">1.05</text>

  <!-- X-axis labels -->
  <text x="80" y="285" text-anchor="middle" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">0%</text>
  <text x="200" y="285" text-anchor="middle" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">5%</text>
  <text x="320" y="285" text-anchor="middle" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">10%</text>
  <text x="440" y="285" text-anchor="middle" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">15%</text>
  <text x="550" y="285" text-anchor="middle" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">20%</text>

  <!-- Axis titles -->
  <text x="315" y="305" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="system-ui, sans-serif">Implied Yield</text>
  <text x="25" y="155" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="system-ui, sans-serif" transform="rotate(-90, 25, 155)">PT Price</text>

  <!-- Grid lines -->
  <line x1="80" y1="190" x2="550" y2="190" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="120" x2="550" y2="120" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="200" y1="50" x2="200" y2="260" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="320" y1="50" x2="320" y2="260" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="50" x2="440" y2="260" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Curve (PT price decreases as yield increases) -->
  <path d="M 80 120 Q 150 130, 200 155 Q 280 190, 320 210 Q 400 235, 550 250" stroke="#4ade80" stroke-width="3" fill="none"/>

  <!-- Current market point -->
  <circle cx="320" cy="210" r="8" fill="#4ade80"/>
  <text x="335" y="205" fill="#fafafa" font-size="11" font-family="system-ui, sans-serif">Current</text>
  <text x="335" y="218" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">10% → 0.9535</text>

  <!-- Legend -->
  <rect x="420" y="60" width="120" height="45" rx="6" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <line x1="435" y1="80" x2="465" y2="80" stroke="#4ade80" stroke-width="3"/>
  <text x="475" y="84" fill="#fafafa" font-size="11" font-family="system-ui, sans-serif">PT Price</text>

  <!-- Annotation -->
  <text x="150" y="100" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">Higher yield</text>
  <text x="150" y="112" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">= Lower PT price</text>
</svg>
