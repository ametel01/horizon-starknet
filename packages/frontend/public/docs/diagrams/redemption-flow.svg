<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a1a1aa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" fill="#18181b"/>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" fill="#fafafa" font-size="14" font-weight="600" font-family="system-ui, sans-serif">Redemption Scenarios</text>

  <!-- Pre-Expiry Section -->
  <text x="175" y="55" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="system-ui, sans-serif">Before Maturity</text>

  <!-- PT Box -->
  <rect x="40" y="80" width="80" height="50" rx="6" stroke="#4ade80" stroke-width="2" fill="#14532d"/>
  <text x="80" y="105" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="500" font-family="system-ui, sans-serif">PT</text>
  <text x="80" y="120" text-anchor="middle" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">105 tokens</text>

  <!-- Plus sign -->
  <text x="145" y="110" text-anchor="middle" fill="#71717a" font-size="20" font-family="system-ui, sans-serif">+</text>

  <!-- YT Box -->
  <rect x="170" y="80" width="80" height="50" rx="6" stroke="#fbbf24" stroke-width="2" fill="#78350f"/>
  <text x="210" y="105" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="500" font-family="system-ui, sans-serif">YT</text>
  <text x="210" y="120" text-anchor="middle" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">105 tokens</text>

  <!-- Arrow -->
  <line x1="260" y1="105" x2="300" y2="105" stroke="#a1a1aa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SY Result -->
  <rect x="310" y="80" width="80" height="50" rx="6" stroke="#60a5fa" stroke-width="2" fill="#1e3a5f"/>
  <text x="350" y="105" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="500" font-family="system-ui, sans-serif">SY</text>
  <text x="350" y="120" text-anchor="middle" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">~97 tokens</text>

  <!-- Divider -->
  <line x1="420" y1="50" x2="420" y2="250" stroke="#3f3f46" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Post-Expiry Section -->
  <text x="560" y="55" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="system-ui, sans-serif">After Maturity</text>

  <!-- PT Box (post) -->
  <rect x="470" y="80" width="80" height="50" rx="6" stroke="#4ade80" stroke-width="2" fill="#14532d"/>
  <text x="510" y="105" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="500" font-family="system-ui, sans-serif">PT</text>
  <text x="510" y="120" text-anchor="middle" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">105 tokens</text>

  <!-- Arrow -->
  <line x1="560" y1="105" x2="600" y2="105" stroke="#a1a1aa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Underlying Result -->
  <rect x="610" y="80" width="80" height="50" rx="6" stroke="#a78bfa" stroke-width="2" fill="#4c1d95"/>
  <text x="650" y="100" text-anchor="middle" fill="#fafafa" font-size="11" font-weight="500" font-family="system-ui, sans-serif">Underlying</text>
  <text x="650" y="120" text-anchor="middle" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">105 tokens</text>

  <!-- YT expired note -->
  <rect x="470" y="145" width="80" height="35" rx="6" stroke="#52525b" stroke-width="1" fill="#27272a" stroke-dasharray="4,2"/>
  <text x="510" y="162" text-anchor="middle" fill="#71717a" font-size="10" font-family="system-ui, sans-serif">YT Expired</text>
  <text x="510" y="174" text-anchor="middle" fill="#71717a" font-size="9" font-family="system-ui, sans-serif">(worthless)</text>

  <!-- Notes -->
  <rect x="40" y="200" width="350" height="60" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="55" y="220" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">Pre-expiry: Need equal PT + YT</text>
  <text x="55" y="238" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">Returns SY (may be less than deposited due to yield</text>
  <text x="55" y="250" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">distribution to YT holders)</text>

  <rect x="430" y="200" width="260" height="60" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="445" y="220" fill="#d4d4d8" font-size="11" font-family="system-ui, sans-serif">Post-expiry: PT only (1:1)</text>
  <text x="445" y="238" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">Each PT redeems for exactly 1 unit of</text>
  <text x="445" y="250" fill="#a1a1aa" font-size="10" font-family="system-ui, sans-serif">underlying asset. YT expires worthless.</text>
</svg>
